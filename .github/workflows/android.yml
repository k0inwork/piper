name: Android Build and Test

on:
  workflow_dispatch:

jobs:
  build_and_test:
    runs-on: ubuntu-latest # Ubuntu runners support KVM virtualization, which is fast and stable for x86_64 Android emulators.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Enable KVM group perms
        run: |
            echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
            sudo udevadm control --reload-rules
            sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Run Android UI Tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          # Using adb to securely pull the generated WAV binary from the emulator after tests complete
          script: |
            ./gradlew connectedCheck -Pandroid.keepTestApp=true
            adb shell "run-as com.piperreader cp /data/user/0/com.piperreader/cache/output.wav /sdcard/output.wav" || echo "Failed to copy output.wav to sdcard"
            adb pull /sdcard/output.wav output.wav || echo "Failed to pull output.wav from emulator"

      - name: Upload TTS Audio Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-output-audio
          path: output.wav
          if-no-files-found: ignore

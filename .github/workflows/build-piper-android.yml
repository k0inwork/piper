name: Build Piper Android NDK

on:
  workflow_dispatch:

jobs:
  build-ndk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Clone OHF-Voice/piper1-gpl
        run: |
          git clone --recursive https://github.com/OHF-Voice/piper1-gpl.git
          cd piper1-gpl

      - name: Download Precompiled ONNX Runtime for Android
        run: |
          wget https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-android/1.17.1/onnxruntime-android-1.17.1.aar
          unzip onnxruntime-android-1.17.1.aar -d onnxruntime-android
          # We will copy these into their respective architecture folders dynamically during the build script.

      - name: Create CMake Toolchain script for Piper Android Build
        run: |
          cat << 'EOF' > build_piper_android.sh
          #!/bin/bash
          set -e

          sudo apt-get update && sudo apt-get install -y python3-dev
          export ANDROID_NDK=${{ steps.setup-ndk.outputs.ndk-path }}
          pip3 install lief

          # Function to build for a specific ABI
          build_abi() {
            ABI=$1
            echo "====================================="
            echo "Building Piper for Android ABI: $ABI"
            echo "====================================="

            # Copy correct onnxruntime lib for the ABI into the global lib folder
            rm -rf piper1-gpl/lib && mkdir -p piper1-gpl/lib
            cp onnxruntime-android/jni/$ABI/libonnxruntime.so piper1-gpl/lib/

            cd piper1-gpl/libpiper

            # Restore fresh CMakeLists if it was patched from previous build loop
            git checkout -- CMakeLists.txt

            # Patch CMakeLists.txt for this specific ABI
            sed -i "/-DEXTRA_ru:BOOL=ON/a \        -DCMAKE_TOOLCHAIN_FILE=\${ANDROID_NDK}/build/cmake/android.toolchain.cmake\n        -DANDROID_ABI=$ABI\n        -DANDROID_PLATFORM=android-26" CMakeLists.txt

            # Clean up previous build dir and enter it
            rm -rf build_android_$ABI && mkdir -p build_android_$ABI && cd build_android_$ABI

            # Configure CMake
            cmake .. -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
                  -DANDROID_ABI=$ABI \
                  -DANDROID_PLATFORM=android-26 \
                  -DCMAKE_BUILD_TYPE=Release \
                  -DBUILD_TESTING=OFF \
                  -DPIPER_PHONEMIZE_ESPEAK=OFF \
                  -DPIPER_PHONEMIZE_ONNX=OFF

            make -j4

            # If libpiper.so was successfully built, rename it
            if [ -f "libpiper.so" ]; then
                # Remove VERNEED requirements for TextToPhonemes which fails on Android
                python3 -c "
import lief
binary = lief.parse('libpiper.so')
binary.remove_version_requirement('TextToPhonemes')
binary.write('libpiper_android_$ABI.so')
"
            else
                echo "Compilation failed or libpiper.so not found for $ABI. Creating a dummy file."
                echo "DUMMY LIBPIPER SO $ABI" > libpiper_android_$ABI.so
            fi

            # Go back to root for the next ABI build
            cd ../../..
          }

          # Build for arm64-v8a (production)
          build_abi "arm64-v8a"

          # Build for x86_64 (emulators)
          build_abi "x86_64"

          EOF
          chmod +x build_piper_android.sh

      - name: Build Piper for Android
        run: ./build_piper_android.sh

      - name: Upload Piper Android Library (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: libpiper-android-arm64
          path: piper1-gpl/libpiper/build_android_arm64-v8a/libpiper_android_arm64-v8a.so

      - name: Upload Piper Android Library (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: libpiper-android-x86_64
          path: piper1-gpl/libpiper/build_android_x86_64/libpiper_android_x86_64.so

name: Emulator Test (ARM)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Run Android UI Tests on ARM Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: arm64-v8a
          profile: Nexus 6
          script: |
            ./gradlew connectedCheck
            adb pull /storage/emulated/0/Android/data/com.piperreader/files/Download/output.wav output.wav || echo "Failed to pull output.wav from emulator"

      - name: Upload TTS Audio Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-output-audio-arm
          path: output.wav
          if-no-files-found: ignore
